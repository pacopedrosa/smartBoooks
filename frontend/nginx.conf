server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de API al backend — mantiene la misma origin, las cookies funcionan
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Cookie          $http_cookie;

        # Reenviar cabeceras de respuesta (incluida Set-Cookie)
        proxy_pass_header  Set-Cookie;
        proxy_pass_header  Authorization;

        # Ocultar cabecera CORS del backend para que nginx sea la única origin
        proxy_hide_header  Access-Control-Allow-Origin;
    }

    # React Router — devuelve siempre index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
}
