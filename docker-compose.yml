services:
  postgres:
    image: postgres:15-alpine
    container_name: smartbooks-db
    environment:
      POSTGRES_DB: smartbooks
      POSTGRES_USER: smartbooks
      POSTGRES_PASSWORD: smartbooks_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - smartbooks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbooks"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smartbooks-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9100:9000"
      - "9101:9001"
    networks:
      - smartbooks-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: smartbooks-ml
    environment:
      DATABASE_URL: postgresql://smartbooks:smartbooks_password@postgres:5432/smartbooks
      DATASET_PATH: /data/main_dataset.csv
    volumes:
      - ./main_dataset.csv:/data/main_dataset.csv:ro
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbooks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartbooks-backend
    env_file:
      - ./backend/.env
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smartbooks-network
    restart: unless-stopped

  pgweb:
    image: sosedoff/pgweb
    container_name: smartbooks-pgweb
    restart: always
    ports:
      - "8082:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://smartbooks:smartbooks_password@postgres:5432/smartbooks?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbooks-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: smartbooks-frontend
    ports:
      - "3010:80"
    depends_on:
      - backend
    networks:
      - smartbooks-network
    restart: unless-stopped

  pgweb:
    container_name: smartbooks-pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://smartbooks:smartbooks_password@postgres:5432/smartbooks?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbooks-network

networks:
  smartbooks-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
