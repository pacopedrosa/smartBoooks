version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartbooks-db
    environment:
      POSTGRES_DB: smartbooks
      POSTGRES_USER: smartbooks
      POSTGRES_PASSWORD: smartbooks_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - smartbooks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbooks"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smartbooks-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - smartbooks-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: smartbooks-ml
    environment:
      DATABASE_URL: postgresql://smartbooks:smartbooks_password@postgres:5432/smartbooks
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbooks-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartbooks-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - smartbooks-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: smartbooks-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smartbooks-network
    restart: unless-stopped

  pgweb:
    container_name: smartbooks-pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://smartbooks:smartbooks_password@postgres:5432/smartbooks?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbooks-network

networks:
  smartbooks-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
